  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"de\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>WMF – Prototyp Suche &amp; Kategorieseite<\u002Ftitle>\n<style>\n  :root{\n    --black:#000;\n    --gold:#ede3b8;\n    --gold-soft:#f5edd0;\n    --bg:#fff;\n    --panel:#f5f3f0;\n    --line:#e3e0dc;\n    --muted:#8a8580;\n    --text:#1a1a1a;\n    --avail:#3f7d4f;\n    --late:#b06b1f;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  body{\n    font-family:\"Helvetica Neue\",Helvetica,Arial,sans-serif;\n    color:var(--text);background:var(--bg);\n    -webkit-font-smoothing:antialiased;\n    letter-spacing:.01em;\n  }\n  button{font:inherit;color:inherit;cursor:pointer;background:none;border:none}\n  :focus-visible{outline:2px solid #2b6cb0;outline-offset:2px}\n \n  /* ---------- Header ---------- */\n  header{\n    background:var(--black);color:#fff;height:68px;\n    display:flex;align-items:center;gap:20px;padding:0 22px;\n    position:sticky;top:0;z-index:60;\n  }\n  .burger{width:24px;display:flex;flex-direction:column;gap:5px}\n  .burger span{height:1.5px;background:#fff;display:block}\n  .burger span:nth-child(2){width:70%}\n  .searchzone{flex:1;display:flex;align-items:center;gap:16px;max-width:640px}\n  .searchfield{\n    flex:1;display:flex;align-items:center;gap:12px;\n    border-bottom:1px solid #6b6b6b;padding:6px 2px;\n  }\n  .searchfield svg{flex:none}\n  .searchfield input{\n    flex:1;background:none;border:none;color:#fff;font-size:15px;outline:none;\n    font-family:inherit;\n  }\n  .searchfield input::placeholder{color:#9a9a9a}\n  .mic,.cam{opacity:.9;font-size:15px;line-height:0;background:none;border:none;color:#fff;padding:2px;cursor:pointer;display:inline-flex;align-items:center}\n  .mic:hover,.cam:hover{opacity:1}\n  .clear{color:#9a9a9a;font-size:20px;line-height:1;padding:0 2px}\n  .logo{\n    position:absolute;left:50%;transform:translateX(-50%);\n    display:flex;align-items:center;\n  }\n  .logo svg{width:32px;height:41px;display:block}\n  .headright{margin-left:auto;display:flex;gap:14px;align-items:center}\n  .hicon{position:relative;display:inline-flex;align-items:center;justify-content:center;width:34px;height:28px}\n  .hicon svg{width:34px;height:26px}\n  .badge{\n    position:absolute;top:-6px;right:-8px;background:var(--gold);color:#000;\n    border-radius:50%;min-width:16px;height:16px;font-size:9px;\n    display:grid;place-items:center;font-weight:700;padding:0 4px;\n  }\n \n  /* ---------- Suggest overlay ---------- */\n  .scrim{\n    position:fixed;inset:68px 0 0 0;background:rgba(0,0,0,.32);\n    z-index:50;opacity:0;pointer-events:none;transition:opacity .18s;\n  }\n  .scrim.on{opacity:1;pointer-events:auto}\n  .suggest{\n    position:fixed;top:68px;left:0;width:min(1120px,72vw);\n    background:var(--panel);z-index:55;\n    padding:26px 30px 30px;\n    max-height:calc(100vh - 68px);overflow:auto;\n    display:none;\n  }\n  .suggest.on{display:block}\n \n  .aihint{\n    background:var(--black);color:#fff;border-radius:3px;\n    padding:16px 20px;display:flex;align-items:center;gap:12px;\n    font-size:14px;margin-bottom:24px;width:100%;text-align:left;\n  }\n  .aihint .arrow{margin-left:auto}\n  .aihint:hover{background:#171717}\n \n  .understood{\n    background:var(--gold);border-radius:3px;padding:16px 18px;\n    display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:26px;\n  }\n  .understood #tokens{display:inline-flex;flex-wrap:wrap;gap:10px}\n  .understood .lbl{font-size:14px;margin-right:6px}\n  .tokchip{\n    background:var(--black);color:#fff;border-radius:999px;\n    padding:7px 14px;font-size:13px;display:inline-flex;align-items:center;gap:10px;\n  }\n  .tokchip .xbtn{display:inline-flex;align-items:center;padding:0;border:0;background:none;cursor:pointer}\n  .tokchip .xbtn svg{width:9px;height:9px;opacity:.85}\n  .tokchip .xbtn:hover svg{opacity:1}\n \n  .eyebrow{\n    font-size:11px;letter-spacing:.14em;color:var(--muted);\n    text-transform:uppercase;margin-bottom:14px;\n  }\n  .sectionhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}\n  .link{font-size:12px;color:#5b5b5b;text-decoration:underline;background:none;border:none;cursor:pointer;padding:0}\n \n  .tops{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;margin-bottom:26px}\n  .top .thumb{background:#fff;height:150px;display:grid;place-items:center;margin-bottom:12px}\n  .top .thumb span{font-size:34px;opacity:.55}\n  .top .nm{font-size:13px;margin-bottom:8px}\n  .top .pr{font-size:13px}\n  .top:hover .thumb{outline:1px solid var(--line)}\n \n  .recent{list-style:none;margin-bottom:26px}\n  .recent li{\n    display:flex;align-items:center;gap:12px;padding:8px 0;font-size:14px;\n  }\n  .recent li .x{margin-left:auto;color:var(--muted);background:none;border:none;cursor:pointer;font-size:14px}\n  .recent li .t{cursor:pointer}\n  .recent li .t:hover{text-decoration:underline}\n \n  .subhead{font-size:16px;margin-bottom:14px;font-weight:400}\n  .chiprow{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:26px}\n  .chip{\n    border:1px solid var(--line);background:#fff;border-radius:999px;\n    padding:9px 16px;font-size:13px;display:inline-flex;align-items:center;gap:9px;\n    transition:border-color .15s,background .15s;\n  }\n  .chip:hover{border-color:#b9b3ab}\n  .chip .plus{display:inline-flex;align-items:center}\n  .chip .plus svg{width:9px;height:9px}\n  .chip.active{background:var(--black);color:#fff;border-color:var(--black)}\n  .chip.active .plus svg path{stroke:#fff}\n  .chip .chip-cnt{color:#5b5b5b;font-size:12px}\n  .chip.active .chip-cnt{color:rgba(255,255,255,.7)}\n \n  /* Chip-Gruppen mit vertikalem Trenner */\n  .chipgroups{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:26px}\n  .chipgroup{display:flex;flex-wrap:wrap;gap:12px}\n  .chip-separator{\n    width:1px;height:28px;background:#c8c4bf;flex:none;\n  }\n \n  .cta{\n    width:100%;background:var(--black);color:#fff;border-radius:999px;\n    padding:19px;font-size:14px;letter-spacing:.12em;text-transform:uppercase;\n    margin-bottom:26px;\n  }\n  .cta:hover{background:#222}\n \n  .themes{display:flex;gap:16px}\n  .theme{width:250px}\n  .theme .img{height:130px;background:#ddd8d1;margin-bottom:8px}\n  .theme .cap{font-size:11px;line-height:1.4;color:#4a4a4a}\n \n  /* ---------- Page ---------- */\n  main{max-width:1180px;margin:0 auto;padding:22px 22px 90px}\n  .crumbs{font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:46px}\n  h1{\n    font-size:40px;font-weight:300;letter-spacing:.22em;\n    text-transform:uppercase;margin-bottom:14px;\n  }\n  .lede{font-size:17px;font-weight:300;letter-spacing:.05em;color:#3c3c3c;margin-bottom:38px}\n \n  .cats{display:flex;gap:16px;margin-bottom:44px;flex-wrap:wrap}\n  .cat{width:110px;cursor:pointer}\n  .cat .img{height:66px;background:#e4e1dd;display:grid;place-items:center;font-size:22px;opacity:.75}\n  .cat .nm{\n    background:#fff;border:1px solid var(--line);border-top:none;\n    font-size:9px;letter-spacing:.1em;text-transform:uppercase;\n    text-align:center;padding:9px 4px;\n  }\n  .cat:hover .nm{background:#faf8f6}\n \n  .fbar{display:flex;align-items:center;gap:16px;margin-bottom:12px;flex-wrap:wrap}\n  .toggle{\n    font-size:11px;letter-spacing:.11em;text-transform:uppercase;\n    display:inline-flex;align-items:center;gap:12px;\n    background:none;border:none;cursor:pointer;padding:11px 0;\n  }\n  .toggle .filter-icon{\n    display:inline-flex;align-items:center;justify-content:center;\n    width:28px;height:28px;\n  }\n  .toggle .filter-icon svg{width:22px;height:22px;color:#1a1a1a}\n  .toggle .toggle-text{\n    border-bottom:1px solid var(--gold);padding-bottom:4px;\n    display:inline-flex;align-items:center;gap:10px;\n  }\n \n  .allfilters{margin-bottom:34px}\n  .allfilters[hidden]{display:none}\n  .ftitle{font-size:12px;letter-spacing:.13em;text-transform:uppercase;margin-bottom:14px}\n  .fchips{display:flex;flex-wrap:wrap;gap:12px;position:relative}\n  .fchip{\n    border:1px solid var(--line);background:#fff;\n    padding:14px 20px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;\n    display:inline-flex;align-items:center;gap:12px;cursor:pointer;\n  }\n  .fchip:hover{border-color:#b9b3ab}\n  .fchip.open{background:var(--gold-soft);border-color:var(--gold)}\n  .fchip.hasactive{background:var(--gold-soft);border-color:var(--gold)}\n  .fchip .cnt{\n    background:var(--black);color:#fff;border-radius:999px;\n    font-size:10px;padding:2px 7px;letter-spacing:.02em;\n  }\n \n  .dropdown{\n    position:absolute;top:100%;margin-top:10px;z-index:30;\n    background:#fff;border:1px solid var(--line);box-shadow:0 10px 30px rgba(0,0,0,.09);\n    width:330px;padding:16px 0 0;\n  }\n  .dropdown .dh{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);padding:0 18px 12px}\n  .opt{\n    display:flex;align-items:center;gap:12px;padding:11px 18px;font-size:13px;width:100%;text-align:left;\n    background:none;border:none;cursor:pointer;\n  }\n  .opt:hover{background:#faf8f6}\n  .opt .box{\n    width:16px;height:16px;border:1px solid #b9b3ab;flex:none;\n    display:grid;place-items:center;\n  }\n  .opt .box svg{width:8px;height:8px;opacity:0}\n  .opt.on .box{background:var(--gold);border-color:var(--gold)}\n  .opt.on .box svg{opacity:1}\n  .opt .cnt{margin-left:auto;font-size:11px;color:var(--muted)}\n  .dfoot{\n    display:flex;align-items:center;justify-content:space-between;\n    padding:14px 18px;border-top:1px solid var(--line);margin-top:10px;\n  }\n  .dfoot .reset{font-size:12px;text-decoration:underline;color:#5b5b5b;background:none;border:none;cursor:pointer}\n  .dfoot .apply{background:var(--black);color:#fff;border-radius:999px;padding:11px 20px;font-size:12px;border:none;cursor:pointer}\n \n  .filter-bar{\n    display:flex;align-items:center;\n    margin-top:20px;margin-bottom:14px;\n  }\n  .meta{\n    display:flex;align-items:center;justify-content:space-between;\n    margin-bottom:22px;\n  }\n  .count{font-size:13px}\n  .meta-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}\n  .activechips{display:flex;align-items:center;gap:8px;flex-wrap:wrap}\n  .actchip{background:#eef0f2;border:none;border-radius:999px;padding:7px 13px;font-size:12px;color:#2a2a2a;display:inline-flex;align-items:center;gap:8px;font-family:inherit}\n  .actchip .x{cursor:pointer;color:#7a7a7a;font-size:13px;line-height:1}\n  .actchip .x:hover{color:#111}\n  .actclear{background:none;border:none;color:#000;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;padding:2px 4px}\n  .actclear:hover{text-decoration:underline}\n  .sort{position:relative;margin-left:auto}\n  .sortbtn{\n    border:1px solid var(--line);padding:11px 16px;font-size:13px;background:#fff;\n    display:inline-flex;align-items:center;gap:14px;cursor:pointer;\n    min-width:240px;justify-content:space-between;font-family:inherit;\n  }\n  .sortbtn:hover{border-color:#b9b3ab}\n  .sortbtn .caret{display:inline-flex;align-items:center;transition:transform .15s}\n  .sort.open .sortbtn .caret{transform:rotate(180deg)}\n  .sortmenu{\n    position:absolute;top:calc(100% + 4px);right:0;\n    background:#fff;border:1px solid var(--line);\n    box-shadow:0 8px 24px rgba(0,0,0,.09);\n    z-index:25;min-width:240px;padding:6px 0;\n  }\n  .sortmenu[hidden]{display:none}\n  .sortmenu button{\n    display:block;width:100%;text-align:left;\n    padding:11px 16px;font-size:13px;\n    border:none;background:none;cursor:pointer;font-family:inherit;\n  }\n  .sortmenu button:hover{background:#faf8f6}\n  .sortmenu button.on{background:var(--gold-soft);font-weight:600}\n \n  .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}\n  .card{border:1px solid var(--line);background:#fff;padding:22px;position:relative;display:flex;flex-direction:column;min-width:0}\n  .card-body{flex:1;display:flex;flex-direction:column}\n  .card-footer{margin-top:auto;padding-top:14px}\n  .flag{\n    position:absolute;top:18px;left:0;background:#98a6b2;color:#fff;\n    font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:6px 14px;\n  }\n  .cardtools{position:absolute;top:16px;right:18px;display:flex;gap:10px;align-items:center;z-index:2}\n  .bagbtn{background:none;border:none;padding:0;cursor:pointer;line-height:0}\n  .bagbtn svg{width:38px;height:38px;display:block}\n  .bagbtn:hover circle{fill:#dfd29a}\n  .fav{\n    width:38px;height:38px;\n    display:inline-flex;align-items:center;justify-content:center;\n    background:none;border:none;cursor:pointer;padding:0;\n    color:#333;font-size:17px;\n  }\n  .fav svg{width:38px;height:38px;display:block}\n  .fav.on{color:#b3402f}\n  .fav.on svg path{stroke:#b3402f}\n  .shotwrap{height:190px;margin:30px 0 16px;overflow:hidden;touch-action:pan-y;cursor:grab;user-select:none}\n  .shotwrap:active{cursor:grabbing}\n  .shot-track{display:flex;height:100%;will-change:transform}\n  .shot-slide{flex:0 0 100%;display:grid;place-items:center}\n  .shot-slide svg.shot{width:60px;height:100px;transition:color .25s ease}\n  .shot-slide svg.shot.trio{width:90px}\n  .shot-silver{color:#c4c4c0}\n  .shot-gold{color:#c9a84c}\n  .shot-black{color:#1a1a1a}\n  .moodimg{position:relative;width:150px;height:150px;border-radius:8px;background:linear-gradient(135deg,#efeae0,#dcd3c2);display:grid;place-items:center}\n  .mood-plate{position:absolute;width:98px;height:98px;border-radius:50%;border:2px solid #cfc6b4;background:radial-gradient(circle at 40% 35%,#f8f4ec,#e6ddcc)}\n  .mood-cut{position:relative;width:30px;height:52px;color:#b0a488;z-index:1}\n  .rail{height:3px;background:#e8e5e1;margin-bottom:22px;position:relative;border-radius:2px}\n  .rail-thumb{position:absolute;left:0;top:0;width:33.333%;height:100%;background:#111;border-radius:2px;transition:left .3s cubic-bezier(.4,0,.15,1)}\n  .brand{font-size:13px;font-weight:700;margin-bottom:3px}\n  .kind{font-size:12px;color:#5b5b5b;margin-bottom:4px}\n  .variant{font-size:13px;font-weight:700;margin-bottom:9px}\n  .incl{font-size:11.5px;color:#5b5b5b;line-height:1.55;margin-bottom:10px}\n  .mat{font-size:12px;color:#4a4a4a;margin-bottom:14px}\n  .vrow{display:flex;align-items:center;gap:9px;margin-bottom:14px;font-size:12px;flex-wrap:wrap}\n  .vrow .lb{color:#5b5b5b}\n  .vchip{border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:11px}\n  .vchip.sel{background:var(--black);color:#fff;border-color:var(--black)}\n  .stars{font-size:12px;color:#333;margin-bottom:16px;display:flex;gap:7px;align-items:center}\n  .stars .n{font-weight:700}\n  .stars .c{color:var(--muted)}\n  .prow{display:flex;align-items:baseline;padding-bottom:14px;border-bottom:1px solid var(--line);margin-bottom:14px}\n  .price{font-size:22px;font-weight:300}\n  .stock{margin-left:auto;font-size:12px;color:var(--late)}\n  .stock.ok{color:var(--avail)}\n  .cmp{display:flex;gap:10px;align-items:center;font-size:12px;color:#4a4a4a}\n  .cmp input{width:15px;height:15px}\n \n  .empty{padding:60px 0;text-align:center;color:var(--muted);font-size:14px;grid-column:1/-1}\n\n  /* ── Produktberater (Guided Finder) ── */\n  .finder{background:#ede3b8;border-radius:4px;padding:26px 30px;margin:22px 0 34px}\n  .finder-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px}\n  .finder-q{display:flex;align-items:center;gap:12px;font-size:20px;font-weight:300;color:#2a2210;letter-spacing:.01em}\n  .finder-q .spark{color:#8a6d16}\n  .finder-step{flex:none;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#7d6a2c;white-space:nowrap;padding-top:6px}\n  .finder-hint{font-size:13px;color:#5e5326;margin:6px 0 0 28px;line-height:1.5}\n  .finder-opts{display:flex;flex-wrap:wrap;align-items:stretch;gap:12px;margin:22px 0 0 28px}\n  .finder-opt{background:#fff;border:1px solid #fff;border-radius:999px;padding:14px 24px;font-size:13px;font-weight:600;color:#1a1a1a;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06);white-space:nowrap;font-family:inherit;display:inline-flex;align-items:center;justify-content:center}\n  .finder-opt:hover{border-color:#c9b56b}\n  .finder-opt.sel{background:#000;color:#fff;border-color:#000}\n  .finder-opt.two{flex-direction:column;align-items:flex-start;gap:3px;border-radius:12px;padding:12px 20px;line-height:1.25}\n  .finder-opt.two .fo-l{font-weight:700}\n  .finder-opt.two .fo-s{font-weight:400;font-size:11px;color:#6b6b6b}\n  .finder-opt.two.sel .fo-s{color:#d8d8d8}\n  .finder-opt.thumb{flex-direction:column;gap:8px;width:130px;border-radius:12px;padding:10px}\n  .finder-thumb{width:100%;height:56px;border-radius:6px;background:linear-gradient(135deg,#f3efe1,#e4dcc0)}\n  .finder-opt.thumb.sel .finder-thumb{outline:2px solid #fff;outline-offset:-4px}\n  .finder-actions{margin:22px auto 0;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:20px;width:max-content}\n  .finder-actions-row{margin:20px 0 0 28px;display:flex;gap:12px}\n  .finder-next{display:inline-flex;align-items:center;gap:8px;padding:15px 26px;font-size:12px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;border:none;border-radius:999px;cursor:pointer;white-space:nowrap;font-family:inherit}\n  .finder-next.enabled{background:#000;color:#fff}\n  .finder-next.disabled{background:#e0cf86;color:#a79458;cursor:default}\n  .finder-next.restart{background:none;border:1px solid #2a2210;color:#2a2210}\n  .finder-back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;padding:0;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.06em;color:#5e5326;cursor:pointer;text-decoration:underline;text-underline-offset:3px}\n  .finder-back:hover{color:#2a2210}\n  .finder-chips{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0 0 28px}\n  .finder-chip{background:#000;color:#fff;border-radius:999px;padding:9px 14px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:8px}\n  .finder-chip .fc-x{background:none;border:none;color:#cfcfcf;cursor:pointer;font-size:15px;line-height:1;padding:0}\n  .finder-chip .fc-x:hover{color:#fff}\n  /* Klickbare Varianten-Chips auf der Karte */\n  .vchip{border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:11px;cursor:pointer;transition:background .12s,border-color .12s}\n  .vchip:hover{border-color:#b9b3ab}\n  .vchip.sel{background:var(--black);color:#fff;border-color:var(--black)}\n \n  /* Farbvarianten-Zeile */\n  .colorrow{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:12px}\n  .colorrow .lb{color:#5b5b5b}\n  .swatch{\n    width:22px;height:22px;border-radius:50%;border:2px solid transparent;\n    cursor:pointer;transition:border-color .12s;position:relative;\n    display:inline-flex;align-items:center;justify-content:center;flex:none;\n  }\n  .swatch:hover{border-color:#b9b3ab}\n  .swatch.sel{border-color:var(--black)}\n  .swatch-silver{background:radial-gradient(circle at 35% 35%, #f0f0ee, #c8c8c4)}\n  .swatch-gold{background:radial-gradient(circle at 35% 35%, #f5e8b0, #c9a84c)}\n  .swatch-black{background:radial-gradient(circle at 35% 35%, #4a4a4a, #0a0a0a)}\n  .color-label{font-size:11px;color:#4a4a4a}\n \n  .note{\n    position:fixed;bottom:0;left:0;right:0;background:#111;color:#ddd;\n    font-size:11px;padding:9px 20px;text-align:center;letter-spacing:.04em;z-index:70;\n  }\n  .note b{color:#fff;font-weight:600}\n \n  /* ── Compare Bar ── */\n  .cmp-bar{\n    position:fixed;bottom:0;left:0;right:0;\n    background:#f5f3f0;border-top:1px solid #ddd;\n    box-shadow:0 -4px 20px rgba(0,0,0,.10);\n    z-index:75;display:none;\n    padding:24px 40px;\n    align-items:center;gap:24px;min-height:220px;\n  }\n  .cmp-bar.visible{display:flex}\n  .cmp-bar-label{\n    font-size:15px;font-weight:600;letter-spacing:.02em;\n    white-space:nowrap;min-width:160px;\n    display:flex;align-it p.activeColor===\"black\") return \"shot-black\";\n    return \"shot-silver\";\n  }\n  function price(p){ return p.size===\"6\" ? p.basePrice6 : p.basePrice12; }\n \n  // Aktuelle Teile-Anzahl je nach activeSize\n  function teile(p){ return p.size===\"12\" ? p.teile12 : p.teile6; }\n \n  // Varianten-Text: \"Bis N Personen – X Teile[ inkl. Servier-Besteck]\"\n  function variantText(p){\n    const personen = p.size===\"12\" ? \"Bis 12 Personen\" : \"Bis 6 Personen\";\n    const zusatz = p.hasServier ? \" inkl. Servier-Besteck\" : \"\";\n    return `${personen} – ${teile(p)} Teile${zusatz}`;\n  }\n \n  // Inhaltsbeschreibung — Basis-Positionen + Servier-Teile wenn vorhanden\n  function inclText(p){\n    const n = p.size;   // \"6\" oder \"12\"\n    const servier = p.hasServier\n      ? (p.size===\"12\" ? \", 6 Servierteile\" : \", 3 Servierteile\")\n      : \",\";\n    return `Enthält: ${n} Messer, ${n} Gabeln, ${n} Suppenlöffel, ${n} Kaffeelöffel, ${n} Kuchengabel${servier}`;\n  }\n \n  /* Chips in \"Direkt verfeinern\" — zwei Gruppen: Kategorien | Attribute */\n  const POPULAR_KATEGORIEN = [\"Besteck-Set\"];\n  const POPULAR_ATTRIBUTE  = [\"Für 6 Personen\",\"Für 12 Personen\",\"Spülmaschinenfest\",\"Cromargan protect®\"];\n  const POPULAR = [...POPULAR_KATEGORIEN, ...POPULAR_ATTRIBUTE];  // für andere Callsites (paintChips iteriert getrennt)\n \n  /* ============ Filter-Definition ============ */\n  const FILTERS = {\n    prodart:{title:\"Produktart\", opts:[\n      {l:\"Besteck-Set\", c:121},{l:\"Steakmesser-Set\", c:18},{l:\"Kinderbesteck\", c:12},{l:\"Servierteile\", c:24},{l:\"Einzelne Besteckteile\", c:33},{l:\"Gabeln\", c:42},{l:\"Löffel\", c:51},{l:\"Menümesser\", c:28}\n    ]},\n    setgr:{title:\"Set-Größe / Umfang\", opts:[\n      {l:\"Für 2 Personen\", c:22},{l:\"Für 4 Personen\", c:44},{l:\"Für 6 Personen\", c:62},{l:\"Für 12 Personen\", c:59},{l:\"4 Stück\", c:14},{l:\"6 Stück\", c:16},{l:\"12 Stück\", c:9}\n    ]},\n    anlnu:{title:\"Anlass / Nutzung\", opts:[\n      {l:\"Für den Alltag\", c:138},{l:\"Für intensive Nutzung\", c:59},{l:\"Für Gäste & besondere Anlässe\", c:70},{l:\"Erste eigene Wohnung\", c:48},{l:\"Als Geschenk\", c:53}\n    ]},\n    stil:{title:\"Stil\", opts:[\n      {l:\"Modern & reduziert\", c:96},{l:\"Klassisch & zeitlos\", c:88},{l:\"Elegant & festlich\", c:41},{l:\"Verspielt\", c:12}\n    ]},\n    preis:{title:\"Preis\", opts:[\n      {l:\"Bis 150 €\", c:62},{l:\"150–250 €\", c:74},{l:\"250–350 €\", c:53},{l:\"350–450 €\", c:38},{l:\"450–650 €\", c:26},{l:\"Ab 650 €\", c:14}\n    ]},\n    mat:{title:\"Material\", opts:[\n      {l:\"Cromargan protect®\", c:67},{l:\"Cromargan® Edelstahl\", c:180},{l:\"Silber / versilbert\", c:20}\n    ]},\n    spuel:{title:\"Spülmaschineneignung\", opts:[\n      {l:\"Spülmaschinenfest\", c:67},{l:\"Spülmaschinengeeignet\", c:180},{l:\"Handwäsche empfohlen\", c:20}\n    ]},\n    ober:{title:\"Oberfläche\", opts:[\n      {l:\"Poliert\", c:176},{l:\"Mattiert\", c:72},{l:\"Teilvergoldet\", c:14},{l:\"Beschichtet\", c:19}\n    ]},\n    farbe:{title:\"Farbe\", opts:[\n      {l:\"Silber\", c:214},{l:\"Schwarz\", c:19},{l:\"Gold\", c:33},{l:\"Bunt\", c:11}\n    ]},\n    serie:{title:\"Serie / Kollektion\", opts:[\n      {l:\"Kineo\", c:22},{l:\"Merit\", c:18},{l:\"Kult Plus\", c:20},{l:\"Nuova\", c:16},{l:\"Boston\", c:24},{l:\"Corvo\", c:15}\n    ]}\n  };\n\n  /* ============ Chip-Counts (Artikel-Anzahl je Chip) ============\n     Wird VOR dem Klick angezeigt: \"so viele Produkte bleiben übrig\".\n     Werte kommen primär aus FILTERS[key].opts[i].c;\n     bei Mehrfach-Options-Chips (6/Bis 12 Personen) wird summiert. */\n  const CHIP_COUNTS = {\n    \"Besteck-Set\":        121,\n    \"Für 6 Personen\":     62,\n    \"Für 12 Personen\":    59,\n    \"Spülmaschinenfest\":  67,\n    \"Cromargan protect®\": 67,\n    \"Kinderbesteck\":      12,\n    \"Silber / versilbert\":20,\n    \"Poliert\":            176\n  };\n\n  /* ============ CHIP ↔ FILTER-MAPPING ============\n     Jeder Chip aus \"Beliebte Auswahl\" verlinkt zu einer Filter-Gruppe\n     und einer oder mehreren Options-Labels. */\n  const CHIP_MAP = {\n    \"Besteck-Set\":        {filter:\"prodart\", opts:[\"Besteck-Set\"]},\n    \"Cromargan protect®\": {filter:\"mat\",     opts:[\"Cromargan protect®\"]},\n    \"Spülmaschinenfest\":  {filter:\"spuel\",   opts:[\"Spülmaschinenfest\"]},\n    \"Für 6 Personen\":     {filter:\"setgr\",   opts:[\"Für 6 Personen\"]},\n    \"Für 12 Personen\":    {filter:\"setgr\",   opts:[\"Für 12 Personen\"]}\n  };\n\n  /* ============ State ============ */\n  const state = {\n    query:\"\",\n    tokens:[],\n    filters: {prodart:new Set(), setgr:new Set(), anlnu:new Set(), stil:new Set(), preis:new Set(), mat:new Set(), spuel:new Set(), ober:new Set(), farbe:new Set(), serie:new Set()},\n    plpActive:new Set(),\n    popularSel:new Set(),\n    openFilter:null,\n    filtersVisible:false,\n    sort:\"popular\",\n    fav:new Set(),\n    compare:new Set(),   // max. 4 Produkt-IDs\n    finder:{step:0, path:null, answers:{}, done:false}\n  };\n \n  const SORT_LABELS = {\n    \"popular\":    \"Beliebteste (Topseller)\",\n    \"price-asc\":  \"Niedrigster Preis\",\n    \"price-desc\": \"Höchster Preis\",\n    \"sale\":       \"Angebote\",\n    \"new\":        \"Neuheiten zuerst\",\n    \"rating\":     \"Beste Bewertungen\"\n  };\n \n  function sortProducts(list){\n    const arr = list.slice();\n    switch(state.sort){\n      case \"price-asc\":  arr.sort((a,b)=>price(a)-price(b)); break;\n      case \"price-desc\": arr.sort((a,b)=>price(b)-price(a)); break;\n      case \"sale\":       arr.sort((a,b)=>(b.sale?1:0)-(a.sale?1:0)); break;\n      case \"new\":        arr.sort((a,b)=>(b.isNew?1:0)-(a.isNew?1:0)); break;\n      case \"rating\":     arr.sort((a,b)=>b.rating-a.rating); break;\n      default: /* popular = Original-Reihenfolge */\n    }\n    return arr;\n  }\n \n  const $ = s=>document.querySelector(s);\n  const q=$(\"#q\"), scrim=$(\"#scrim\"), suggest=$(\"#suggest\");\n \n  /* ============ 3-Zustand-Overlay ============\n     Zustand 1 – Default:  kein Text, nur Fokus\n     Zustand 2 – Generisch: 1 Token (z.B. \"Bestecke\")\n     Zustand 3 – Spezifisch: ≥2 Tokens (z.B. \"Besteck-Sets + Bis 12 Personen + spülmaschinenfest\")\n  ============================================ */\n \n  function showOnly(id){\n    [\"stateDefault\",\"stateGeneric\",\"stateSpecific\"].forEach(s=>{\n      document.getElementById(s).hidden = (s!==id);\n    });\n  }\n \n  function openSuggest(){ suggest.classList.add(\"on\"); scrim.classList.add(\"on\"); renderOverlay(); }\n  function closeSuggest(){ suggest.classList.remove(\"on\"); scrim.classList.remove(\"on\"); }\n \n  q.addEventListener(\"focus\", openSuggest);\n  scrim.addEventListener(\"click\", closeSuggest);\n  document.addEventListener(\"keydown\", e=>{ if(e.key===\"Escape\"){ closeSuggest(); closeDropdown(); }});\n \n  $(\"#clearq\").addEventListener(\"click\", ()=>{\n    q.value=\"\"; state.query=\"\"; state.tokens=[];\n    renderOverlay(); q.focus();\n  });\n \n  q.addEventListener(\"input\", ()=>{\n    state.query = q.value.trim();\n    state.tokens = parse(state.query);\n    renderOverlay();\n  });\n \n  /* AI-Hint → spezifische Query einfüllen */\n  $(\"#aihint\").addEventListener(\"click\", ()=>{\n    q.value = \"Bestecke für 12 Personen, spülmaschinenfest\";\n    state.query = q.value;\n    state.tokens = parse(state.query);\n    renderOverlay();\n  });\n \n  /* Letzte Suchen: löschen + klickbar */\n  $(\"#clearRecent\").addEventListener(\"click\", ()=>{ $(\"#recentList\").innerHTML=\"\"; });\n  document.querySelectorAll(\"#recentList .x\").forEach(b=>{\n    b.addEventListener(\"click\", ()=> b.parentElement.remove());\n  });\n \n  /* Default-State: alle .t und .chip[data-fill] füllen das Suchfeld */\n  document.querySelectorAll(\"#stateDefault .t[data-fill], #stateDefault .chip[data-fill]\").forEach(el=>{\n    el.addEventListener(\"click\", ()=>{\n      q.value = el.dataset.fill;\n      state.query = q.value;\n      state.tokens = parse(state.query);\n      renderOverlay();\n    });\n  });\n \n  /* Generisch-State: Chip-Klicks fügen Token hinzu */\n  document.querySelectorAll(\"#stateGeneric .sug-chip\").forEach(b=>{\n    b.addEventListener(\"click\", ()=>{\n      const v = b.dataset.add;\n      if(!state.tokens.includes(v)) state.tokens.push(v);\n      // Wenn ein zweiter Chip hinzugefügt wird → wechsel zu spezifisch\n      renderOverlay();\n    });\n  });\n \n  /* Generic-Remove-Button */\n  document.getElementById(\"genericRemove\").addEventListener(\"click\", ()=>{\n    q.value=\"\"; state.query=\"\"; state.tokens=[];\n    renderOverlay();\n  });\n \n  /* Spezifisch-State: Chips */\n  document.querySelectorAll(\"#stateSpecific .sug-chip\").forEach(b=>{\n    b.addEventListener(\"click\", ()=>{\n      const v = b.dataset.add;\n      if(!state.tokens.includes(v)) state.tokens.push(v);\n      renderOverlay();\n    });\n  });\n \n  /* NLP-Parser: Text → Token-Array */\n  /* NLP-Parser: Text → Token-Array\n     Chips erst wenn ganze Wörter ausgeschrieben sind:\n     - \"bestecke\" (mit e) → Bestecke\n     - \"12 Personen\" komplett → Bis 12 Personen\n     - \"6 Personen\" komplett → Bis 6 Personen\n     - \"spülmaschinenfest\" komplett → Spülmaschinenfest\n     - \"cromargan protect\" → Cromargan protect® */\n  function parse(text){\n    const t = text.toLowerCase();\n    if(!t) return [];\n    const out=[];\n \n    const hasBestecke = /\\bbesteck/.test(t);\n    const has12Pers   = /\\b12 personen\\b/.test(t) || /\\bzwölf personen\\b/.test(t);\n    const has6Pers    = /\\b6 personen\\b/.test(t)  || /\\bsechs personen\\b/.test(t);\n    const hasSpuel    = /\\bspülmaschinenfest\\b/.test(t);\n    const hasCromProt = /\\bcromargan protect\\b/.test(t);\n \n    if(hasBestecke){\n      // Mit weiteren spezifischen Angaben → Besteck-Sets (statt allgemeiner \"Bestecke\")\n      if(has12Pers || has6Pers || hasSpuel) out.push(\"Besteck-Set\");\n      else out.push(\"Bestecke\");\n    }\n    if(has12Pers)   out.push(\"Für 12 Personen\");\n    if(has6Pers)    out.push(\"Für 6 Personen\");\n    if(hasSpuel)    out.push(\"Spülmaschinenfest\");\n    if(hasCromProt) out.push(\"Cromargan protect®\");\n \n    return out;   // kein Fallback: unvollständige Wörter → keine Chips\n  }\n \n  function countForTokens(toks){\n    if(!toks.length) return 267;\n    const has=v=>toks.includes(v);\n    const bs=has(\"Besteck-Set\"), p12=has(\"Für 12 Personen\"), p6=has(\"Für 6 Personen\"), sp=has(\"Spülmaschinenfest\");\n    if(bs&&p12&&sp) return 20;\n    if(bs&&p6&&sp) return 24;\n    if(bs&&p12) return 59;\n    if(bs&&p6) return 62;\n    if(bs) return 121;\n    if(toks.length===1 && toks[0]===\"Bestecke\") return 267;\n    const cc={\"Spülmaschinenfest\":67,\"Cromargan protect®\":67,\"Kinderbesteck\":12,\"Silber / versilbert\":20,\"Poliert\":176,\"Für 6 Personen\":62,\"Für 12 Personen\":59,\"Besteck-Set\":121,\"Bestecke\":267};\n    const vals=toks.map(t=>cc[t]).filter(x=>x!=null);\n    return vals.length? Math.min(...vals) : 267;\n  }\n\n  /* Zustand ermitteln und rendern */\n  function renderOverlay(){\n    if(!state.tokens.length){\n      showOnly(\"stateDefault\");\n      return;\n    }\n    if(state.tokens.length === 1){\n      showOnly(\"stateGeneric\");\n      $(\"#showResultsGeneric\").textContent = countForTokens(state.tokens)+\" Ergebnisse anzeigen\";\n      return;\n    }\n    // ≥2 Tokens → spezifisch\n    showOnly(\"stateSpecific\");\n    $(\"#showResultsSpecific\").textContent = countForTokens(state.tokens)+\" Ergebnisse anzeigen\";\n    // Verstanden-Chips dynamisch rendern\n    const tokEl = $(\"#tokens\");\n    tokEl.innerHTML = state.tokens.map((t,i)=>\n      `<span class=\"tokchip\">${t}<button class=\"xbtn\" data-i=\"${i}\" aria-label=\"${t} entfernen\"><svg style=\"color:#fff\"><use href=\"#i-close\"/><\u002Fsvg><\u002Fbutton><\u002Fspan>`\n    ).join(\"\");\n    tokEl.querySelectorAll(\".xbtn\").forEach(b=>{\n      b.addEventListener(\"click\", ()=>{\n        state.tokens.splice(+b.dataset.i, 1);\n        if(!state.tokens.length){ q.value=\"\"; state.query=\"\"; }\n        renderOverlay();\n      });\n    });\n  }\n \n  /* ── Ergebnisse anzeigen (generisch) ── */\n  $(\"#showResultsGeneric\").addEventListener(\"click\", ()=>{\n    Object.values(state.filters).forEach(s=>s.clear());\n    // Generisch: Besteck-Sets als Kategorie vorauswählen\n    state.filters.prodart.add(\"Besteck-Set\");\n    syncChipsFromFilters();\n    closeSuggest();\n    paintPLP();\n    window.scrollTo({top:0,behavior:\"smooth\"});\n  });\n \n  /* ── Ergebnisse anzeigen (spezifisch) ── */\n  $(\"#showResultsSpecific\").addEventListener(\"click\", ()=>{\n    Object.values(state.filters).forEach(s=>s.clear());\n    state.tokens.forEach(t=>{\n      if(CHIP_MAP[t]) CHIP_MAP[t].opts.forEach(o=>state.filters[CHIP_MAP[t].filter].add(o));\n      if(t===\"Spülmaschinenfest\") state.filters.spuel.add(\"Spülmaschinenfest\");\n    });\n    syncChipsFromFilters();\n    closeSuggest();\n    paintPLP();\n    window.scrollTo({top:0,behavior:\"smooth\"});\n  });\n \n  /* ============ PLP: Chips ↔ Filter Sync ============ */\n  const plpChips = $(\"#plpChips\");\n \n  function toggleChip(chipLabel){\n    const map = CHIP_MAP[chipLabel];\n    if(!map){ return; } // nicht gemappt → nichts tun (Placeholder-Chip)\n    const set = state.filters[map.filter];\n    const on = state.popularSel.has(chipLabel);\n    if(on){\n      state.popularSel.delete(chipLabel);\n      map.opts.forEach(o=>set.delete(o));\n    } else {\n      state.popularSel.add(chipLabel);\n      map.opts.forEach(o=>set.add(o));\n    }\n    paintPLP();\n    // Falls das entsprechende Dropdown gerade offen ist: neu zeichnen\n    if(state.openFilter === map.filter) paintDropdown(FILTERS[map.filter], map.filter);\n  }\n \n  function toggleOption(key, opt){\n    const set = state.filters[key];\n    set.has(opt) ? set.delete(opt) : set.add(opt);\n    syncChipsFromFilters();\n    paintDropdown(FILTERS[key], key);\n    paintPLP();\n  }\n \n  /* Ableitung: aktive Chips = \"mindestens eine Option des Chip-Mappings ist an\" */\n  function syncChipsFromFilters(){\n    state.plpActive.clear();\n    Object.entries(CHIP_MAP).forEach(([chip, m])=>{\n      const anyOn = m.opts.some(o => state.filters[m.filter].has(o));\n      if(anyOn) state.plpActive.add(chip);\n    });\n  }\n \n  function paintChips(){\n    const chipHtml = c => {\n      const on = state.popularSel.has(c);\n      const cnt = CHIP_COUNTS[c];\n      const suffix = on\n        ? `<span class=\"plus\"><svg style=\"color:#fff\"><use href=\"#i-close\"/><\u002Fsvg><\u002Fspan>`\n        : (cnt !== undefined\n            ? `<span class=\"chip-cnt\">(${cnt})<\u002Fspan>`\n            : `<span class=\"plus\"><svg><use href=\"#i-plus\"/><\u002Fsvg><\u002Fspan>`);\n      return `<button class=\"chip ${on?\"active\":\"\"}\" data-c=\"${c}\">${c} ${suffix}<\u002Fbutton>`;\n    };\n    plpChips.innerHTML =\n      `<div class=\"chipgroup\">${POPULAR_KATEGORIEN.map(chipHtml).join(\"\")}<\u002Fdiv>` +\n      `<div class=\"chip-separator\"><\u002Fdiv>` +\n      `<div class=\"chipgroup\">${POPULAR_ATTRIBUTE.map(chipHtml).join(\"\")}<\u002Fdiv>`;\n    plpChips.querySelectorAll(\".chip\").forEach(b=>{\n      b.addEventListener(\"click\", ()=> toggleChip(b.dataset.c));\n    });\n  }\n \n  /* ============ Filter-Chips (Alle Filter) ============ */\n  const dropdown = $(\"#dropdown\");\n  function closeDropdown(){\n    state.openFilter=null; dropdown.hidden=true;\n    document.querySelectorAll(\".fchip\").forEach(c=>c.classList.remove(\"open\"));\n  }\n \n  function paintFilterChips(){\n    document.querySelectorAll(\".fchip\").forEach(chip=>{\n      const key = chip.dataset.f;\n      const activeCount = state.filters[key] ? state.filters[key].size : 0;\n      chip.classList.toggle(\"hasactive\", activeCount>0 && state.openFilter!==key);\n      // Zähler anzeigen wenn aktiv\n      const label = chip.childNodes[0].nodeValue.replace(/\\s+$/,'');\n      const plusSpan = chip.querySelector(\".plus\");\n      if(activeCount>0){\n        if(!chip.querySelector(\".cnt\")){\n          const s=document.createElement(\"span\");\n          s.className=\"cnt\"; s.textContent=activeCount;\n          chip.insertBefore(s, plusSpan);\n        } else {\n          chip.querySelector(\".cnt\").textContent = activeCount;\n        }\n      } else {\n        const c = chip.querySelector(\".cnt\"); if(c) c.remove();\n      }\n    });\n  }\n \n  document.querySelectorAll(\".fchip\").forEach(chip=>{\n    chip.addEventListener(\"click\", (e)=>{\n      e.stopPropagation();\n      const key = chip.dataset.f;\n      if(state.openFilter===key){ closeDropdown(); paintFilterChips(); return; }\n      closeDropdown();\n      const cfg = FILTERS[key];\n      if(!cfg){ paintFilterChips(); return; }   // nur belegte Filter öffnen\n      state.openFilter=key;\n      chip.classList.add(\"open\");\n      dropdown.hidden=false;\n      dropdown.style.left = (chip.offsetLeft) + \"px\";\n      dropdown.style.top  = (chip.offsetTop + chip.offsetHeight) + \"px\";\n      paintDropdown(cfg,key);\n      paintFilterChips();\n    });\n  });\n  document.addEventListener(\"click\", (e)=>{ if(!dropdown.contains(e.target)){ closeDropdown(); paintFilterChips(); } });\n \n  function paintDropdown(cfg,key){\n    const sel = state.filters[key];\n    dropdown.innerHTML = `\n      <div class=\"dh\">${cfg.title}<\u002Fdiv>\n      ${cfg.opts.map(o=>`\n        <button class=\"opt ${sel.has(o.l)?\"on\":\"\"}\" data-o=\"${o.l}\">\n          <span class=\"box\"><svg><use href=\"#i-check\"/><\u002Fsvg><\u002Fspan>\n          <span>${o.l}<\u002Fspan>\n          <span class=\"cnt\">${o.c}<\u002Fspan>\n        <\u002Fbutton>`).join(\"\")}\n      <div class=\"dfoot\">\n        <button class=\"reset\">Zurücksetzen<\u002Fbutton>\n        <button class=\"apply\">${total()} Artikel anzeigen<\u002Fbutton>\n      <\u002Fdiv>`;\n \n    dropdown.querySelectorAll(\".opt\").forEach(o=>{\n      o.addEventListener(\"click\", ()=> toggleOption(key, o.dataset.o));\n    });\n    dropdown.querySelector(\".reset\").addEventListener(\"click\", ()=>{\n      state.filters[key].clear();\n      syncChipsFromFilters();\n      paintDropdown(cfg,key); paintPLP();\n    });\n    dropdown.querySelector(\".apply\").addEventListener(\"click\", ()=>{ closeDropdown(); paintFilterChips(); });\n  }\n \n  /* ============ Produkt-Filterung ============ */\n  function visible(){\n    return products.filter(p=>{\n      // Set-Größe / Umfang: Für 6 / Für 12 Personen matchen auf Prototyp-Produktgröße\n      if(state.filters.setgr.size){\n        const want12 = state.filters.setgr.has(\"Für 12 Personen\");\n        const want6  = state.filters.setgr.has(\"Für 6 Personen\");\n        if(want12 || want6){\n          const ok = (want12 && p.size===\"12\") || (want6 && p.size===\"6\");\n          if(!ok) return false;\n        }\n      }\n      // Produktart: Besteck-Set\n      if(state.filters.prodart.has(\"Besteck-Set\") && !p.sets) return false;\n      // Material\n      if(state.filters.mat.size){\n        let ok=false;\n        if(state.filters.mat.has(\"Cromargan protect®\") && p.cromargan) ok=true;\n        if(state.filters.mat.has(\"Cromargan® Edelstahl\") && p.cromargan) ok=true;\n        if(!ok) return false;\n      }\n      // Spülmaschineneignung\n      if(state.filters.spuel.size){\n        const sFest=state.filters.spuel.has(\"Spülmaschinenfest\");\n        const sGeeig=state.filters.spuel.has(\"Spülmaschinengeeignet\");\n        const sHand=state.filters.spuel.has(\"Handwäsche empfohlen\");\n        let ok=false;\n        if((sFest||sGeeig) && p.spuel) ok=true;\n        if(sHand) ok=false;\n        if(!ok) return false;\n      }\n      return true;\n    });\n  }\n\n  /* Simulierte Gesamtanzahl (Katalog-Niveau) */\n  function total(){\n    const F = state.filters;\n    const anyActive = Object.values(F).some(s=>s.size>0);\n    if(!anyActive) return 267;\n    const has = (k,v)=>F[k].has(v);\n    const bs   = has(\"prodart\",\"Besteck-Set\");\n    const p12  = has(\"setgr\",\"Für 12 Personen\");\n    const p6   = has(\"setgr\",\"Für 6 Personen\");\n    const intens = has(\"anlnu\",\"Für intensive Nutzung\");\n    const modern = has(\"stil\",\"Modern & reduziert\");\n    const price300 = has(\"preis\",\"300–500 €\");\n    const price150 = has(\"preis\",\"150–250 €\");\n    if(bs && p12 && intens && modern && price300) return 8;\n    if(bs && p12 && intens && modern) return 18;\n    if(bs && p12 && intens) return 34;\n    if(bs && p12) return 59;\n    if(bs && p6 && price150) return 14;\n    if(bs && p6) return 62;\n    if(bs) return 121;\n    // generischer Fallback: pro aktivem Filterwert reduzieren\n    const cnt = Object.values(F).reduce((s,set)=>s+set.size,0);\n    return Math.max(8, 267 - cnt*40);\n  }\n\n  function paintCount(){\n    const n = total();\n    const anyActive = Object.values(state.filters).some(s=>s.size>0);\n    $(\"#count\").textContent = anyActive ? `${n} passende Artikel` : `${n} Artikel`;\n  }\n \n  function paintGrid(){\n    const list = sortProducts(visible());\n    const grid = $(\"#grid\");\n    if(!list.length){\n      grid.innerHTML = `<div class=\"empty\">Keine Artikel für diese Auswahl. Filter anpassen oder zurücksetzen.<\u002Fdiv>`;\n      return;\n    }\n \n    grid.innerHTML = list.map(p=>{\n      const pr = price(p);\n      const colorRow = p.colors ? `\n        <div class=\"colorrow\">\n          <span class=\"lb\">Farbe:<\u002Fspan>\n          ${p.colors.map(c=>`\n            <button class=\"swatch ${c.cls} ${p.activeColor===c.key?\"sel\":\"\"}\" data-id=\"${p.id}\" data-color=\"${c.key}\" title=\"${c.label}\" aria-label=\"${c.label}\"><\u002Fbutton>\n          `).join(\"\")}\n          <span class=\"color-label\">${p.colors.find(c=>c.key===p.activeColor)?.label||\"\"}<\u002Fspan>\n        <\u002Fdiv>` : \"\";\n \n      return `\n      <article class=\"card\" data-id=\"${p.id}\">\n        ${p.flag?`<div class=\"flag\">${p.flag}<\u002Fdiv>`:\"\"}\n        <div class=\"cardtools\">\n          <button class=\"bagbtn\" aria-label=\"In den Warenkorb\"><svg viewBox=\"0 0 43 43\"><use href=\"#i-kaufen\"/><\u002Fsvg><\u002Fbutton>\n          <button class=\"fav ${state.fav.has(p.id)?\"on\":\"\"}\" data-fav=\"${p.id}\" aria-label=\"Merken\">\n            <svg viewBox=\"0 0 50 39\" style=\"color:${state.fav.has(p.id)?\"#b3402f\":\"#333\"}\"><use href=\"#i-heart\"/><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"shotwrap\" data-id=\"${p.id}\" data-idx=\"0\">\n          <div class=\"shot-track\">\n            <div class=\"shot-slide\"><svg class=\"shot ${shotColorClass(p)}\" viewBox=\"0 0 60 100\"><use href=\"#i-cutlery\"/><\u002Fsvg><\u002Fdiv>\n            <div class=\"shot-slide\"><div class=\"moodimg\"><span class=\"mood-plate\"><\u002Fspan><svg class=\"mood-cut\" viewBox=\"0 0 60 100\"><use href=\"#i-cutlery\"/><\u002Fsvg><\u002Fdiv><\u002Fdiv>\n            <div class=\"shot-slide\"><svg class=\"shot trio ${shotColorClass(p)}\" viewBox=\"0 0 90 100\"><use href=\"#i-cutlery3\"/><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rail\"><div class=\"rail-thumb\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"card-body\">\n          <div class=\"brand\">${p.brand}<\u002Fdiv>\n          <div class=\"kind\">Besteck-Set<\u002Fdiv>\n          <div class=\"variant\">${variantText(p)}<\u002Fdiv>\n          <div class=\"incl\">${inclText(p)}<\u002Fdiv>\n          <div class=\"mat\">Poliert - Cromargan protect® Edelstahl<\u002Fdiv>\n          <div class=\"vrow\">\n            <span class=\"lb\">Varianten:<\u002Fspan>\n            <button class=\"vchip ${p.size===\"6\"?\"sel\":\"\"}\" data-id=\"${p.id}\" data-sz=\"6\">Bis 6 Personen<\u002Fbutton>\n            <button class=\"vchip ${p.size===\"12\"?\"sel\":\"\"}\" data-id=\"${p.id}\" data-sz=\"12\">Bis 12 Personen<\u002Fbutton>\n          <\u002Fdiv>\n          ${colorRow}\n          <div class=\"stars\">★★★★★ <span class=\"n\">${p.rating.toFixed(1)}<\u002Fspan> <span class=\"c\">(${p.reviews})<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card-footer\">\n          <div class=\"prow\">\n            <span class=\"price\">€${pr}<\u002Fspan>\n            <span class=\"stock ${p.ok?\"ok\":\"\"}\">${p.stock}<\u002Fspan>\n          <\u002Fdiv>\n          <label class=\"cmp\">\n            <input type=\"checkbox\" class=\"cmp-cb\" data-id=\"${p.id}\" ${state.compare.has(p.id)?\"checked\":\"\"} ${!state.compare.has(p.id)&&state.compare.size>=4?\"disabled\":\"\"} />\n            Vergleichen\n          <\u002Flabel>\n        <\u002Fdiv>\n      <\u002Farticle>`;\n    }).join(\"\");\n \n    // Merkzettel\n    grid.querySelectorAll(\"[data-fav]\").forEach(b=>{\n      b.addEventListener(\"click\", ()=>{\n        const k=b.dataset.fav;\n        state.fav.has(k) ? state.fav.delete(k) : state.fav.add(k);\n        paintGrid();\n      });\n    });\n \n    // Vergleichen-Checkboxen\n    grid.querySelectorAll(\".cmp-cb\").forEach(cb=>{\n      cb.addEventListener(\"change\", ()=>{\n        const id = cb.dataset.id;\n        if(cb.checked){\n          if(state.compare.size < 4) state.compare.add(id);\n          else { cb.checked=false; return; }\n        } else {\n          state.compare.delete(id);\n        }\n        paintCompareBar();\n        // Nur Checkboxen im Grid aktualisieren (disabled-State bei max. 4)\n        grid.querySelectorAll(\".cmp-cb\").forEach(c=>{\n          if(!state.compare.has(c.dataset.id))\n            c.disabled = state.compare.size >= 4;\n        });\n      });\n    });\n \n    // Größen-Chips — klickbar, Preis + Text aktualisieren ohne Full-Repaint\n    grid.querySelectorAll(\".vchip[data-sz]\").forEach(btn=>{\n      btn.addEventListener(\"click\", ()=>{\n        const p = products.find(x=>x.id===btn.dataset.id);\n        if(!p || p.size===btn.dataset.sz) return;\n        p.size = btn.dataset.sz;\n        // Nur diese Karte neu rendern (kein Full-paintGrid → kein Scroll-Jump)\n        paintCard(p);\n      });\n    });\n \n    // Farb-Swatches\n    grid.querySelectorAll(\".swatch[data-color]\").forEach(btn=>{\n      btn.addEventListener(\"click\", ()=>{\n        const p = products.find(x=>x.id===btn.dataset.id);\n        if(!p) return;\n        p.activeColor = btn.dataset.color;\n        paintCard(p);\n      });\n    });\n  }\n \n  /* Einzelne Karte in-place aktualisieren (kein Scroll-Jump) */\n  function paintCard(p){\n    const card = $(\"#grid\").querySelector(`[data-id=\"${p.id}\"]`);\n    if(!card){ paintGrid(); return; }\n    const pr = price(p);\n \n    card.querySelector(\".variant\").textContent = variantText(p);\n    card.querySelector(\".incl\").textContent    = inclText(p);\n    card.querySelector(\".price\").textContent   = `€${pr}`;\n \n    // Thumbnail-Farbe sofort aktualisieren (Baymard: immer Thumbnail bei Farbwechsel updaten)\n    card.querySelectorAll(\".shot-track svg.shot\").forEach(s=>{\n      s.classList.remove(\"shot-silver\",\"shot-gold\",\"shot-black\");\n      s.classList.add(shotColorClass(p));\n    });\n \n    // Größen-Chips\n    card.querySelectorAll(\".vchip[data-sz]\").forEach(b=>{\n      b.classList.toggle(\"sel\", b.dataset.sz===p.size);\n    });\n \n    // Farb-Swatches\n    if(p.colors){\n      card.querySelectorAll(\".swatch[data-color]\").forEach(b=>{\n        b.classList.toggle(\"sel\", b.dataset.color===p.activeColor);\n      });\n      const label = card.querySelector(\".color-label\");\n      if(label) label.textContent = p.colors.find(c=>c.key===p.activeColor)?.label||\"\";\n    }\n \n    // Compare-Bar-Slot ebenfalls updaten falls dieses Produkt verglichen wird\n    if(state.compare.has(p.id)) paintCompareBar();\n  }\n \n  /* ============ Sortierung ============ */\n  const sortEl = $(\"#sort\"), sortBtn = $(\"#sortBtn\"), sortMenu = $(\"#sortMenu\"), sortLabel = $(\"#sortLabel\");\n \n  function closeSort(){\n    sortMenu.hidden = true;\n    sortEl.classList.remove(\"open\");\n    sortBtn.setAttribute(\"aria-expanded\",\"false\");\n  }\n  function openSort(){\n    sortMenu.hidden = false;\n    sortEl.classList.add(\"open\");\n    sortBtn.setAttribute(\"aria-expanded\",\"true\");\n    // Aktive Option markieren\n    sortMenu.querySelectorAll(\"button\").forEach(b=>{\n      b.classList.toggle(\"on\", b.dataset.s===state.sort);\n    });\n  }\n  sortBtn.addEventListener(\"click\", (e)=>{\n    e.stopPropagation();\n    sortEl.classList.contains(\"open\") ? closeSort() : openSort();\n  });\n  sortMenu.querySelectorAll(\"button\").forEach(b=>{\n    b.addEventListener(\"click\", ()=>{\n      state.sort = b.dataset.s;\n      sortLabel.textContent = SORT_LABELS[state.sort];\n      closeSort();\n      paintGrid();\n    });\n  });\n  document.addEventListener(\"click\", (e)=>{\n    if(!sortEl.contains(e.target)) closeSort();\n  });\n \n  $(\"#toggleFilters\").addEventListener(\"click\", ()=>{\n    state.filtersVisible = !state.filtersVisible;\n    $(\"#allFilters\").hidden = !state.filtersVisible;\n    $(\"#toggleLabel\").textContent = state.filtersVisible ? \"Alle Filter ausblenden\" : \"Alle Filter einblenden\";\n    closeDropdown();\n  });\n \n  function paintActiveChips(){\n    const wrap = $(\"#activeChips\");\n    const items = [];\n    Object.entries(state.filters).forEach(([k,set])=>{ set.forEach(v=> items.push({k,v})); });\n    if(!items.length){ wrap.innerHTML=\"\"; return; }\n    wrap.innerHTML = items.map(it=>`<span class=\"actchip\">${it.v}<button class=\"x\" data-k=\"${it.k}\" data-v=\"${it.v}\" aria-label=\"${it.v} entfernen\">&times;<\u002Fbutton><\u002Fspan>`).join(\"\")\n      + `<button class=\"actclear\" id=\"actClear\">Alle Filter entfernen<\u002Fbutton>`;\n    wrap.querySelectorAll(\".actchip .x\").forEach(b=>{\n      b.addEventListener(\"click\", ()=>{\n        state.filters[b.dataset.k].delete(b.dataset.v);\n        { const fn=state.finder; Object.keys(fn.answers).forEach(id=>{ const a=fn.answers[id]; if(a.key===b.dataset.k && a.val===b.dataset.v) delete fn.answers[id]; }); if(!fn.answers['S1']) fn.path=null; }\n        syncChipsFromFilters(); paintPLP(); if(typeof renderFinder===\"function\") renderFinder();\n      });\n    });\n    const clr = wrap.querySelector(\"#actClear\");\n    if(clr) clr.addEventListener(\"click\", ()=>{\n      Object.values(state.filters).forEach(s=>s.clear());\n      { const fn=state.finder; fn.answers={}; fn.path=null; fn.step=0; fn.done=false; }\n      syncChipsFromFilters(); paintPLP(); if(typeof renderFinder===\"function\") renderFinder();\n    });\n  }\n\n  /* ── Thumbnail-Swipe in Produktkacheln ── */\n  function applySlide(w, idx, dxPct, animate){\n    const track=w.querySelector('.shot-track');\n    const thumb=w.parentElement.querySelector('.rail-thumb');\n    track.style.transition = animate ? 'transform .3s cubic-bezier(.4,0,.15,1)' : 'none';\n    const base = -idx*100;\n    track.style.transform = 'translateX(calc('+base+'% + '+(dxPct||0)+'px))';\n    if(thumb) thumb.style.left = (idx*33.333)+'%';\n  }\n  (function initSwipe(){\n    let drag=null;\n    document.addEventListener('pointerdown', e=>{\n      const w=e.target.closest('.shotwrap'); if(!w) return;\n      drag={w, x:e.clientX, idx:+(w.dataset.idx||0), moved:false};\n      applySlide(w, drag.idx, 0, false);\n    });\n    document.addEventListener('pointermove', e=>{\n      if(!drag) return;\n      const dx=e.clientX-drag.x; if(Math.abs(dx)>4) drag.moved=true;\n      applySlide(drag.w, drag.idx, dx, false);\n    });\n    function end(e){\n      if(!drag) return;\n      const dx=(e.clientX||drag.x)-drag.x; const th=40;\n      let idx=drag.idx;\n      if(dx<=-th) idx=Math.min(2, idx+1);\n      else if(dx>=th) idx=Math.max(0, idx-1);\n      drag.w.dataset.idx=idx;\n      applySlide(drag.w, idx, 0, true);\n      drag=null;\n    }\n    document.addEventListener('pointerup', end);\n    document.addEventListener('pointercancel', end);\n  })();\n\n  function paintPLP(){ paintChips(); paintFilterChips(); paintGrid(); paintCount(); paintActiveChips(); }\n  paintPLP();\n\n  /* ============ Mobile Vollbild-Filter (Breuninger-Stil) ============ */\n  (function(){\n    var ORDER=['prodart','setgr','anlnu','stil','preis','mat','spuel','ober','farbe','serie'];\n    var chev='<svg width=\"16\" height=\"16\" class=\"mf-chev\"><use href=\"#i-chevron\"/><\u002Fsvg>';\n    var chevR=chev.replace('class=\"mf-chev\"','class=\"mf-chev\" style=\"transform:rotate(-90deg)\"');\n    var chk='<svg><use href=\"#i-check\"/><\u002Fsvg>';\n    // Trigger-Button vor .meta einsetzen\n    var meta=document.querySelector('.meta');\n    var btn=document.createElement('button');\n    btn.id='mfBtn';\n    meta.parentNode.insertBefore(btn,meta);\n    // Overlay-DOM\n    var scrim=document.createElement('div'); scrim.className='mf-scrim'; scrim.hidden=true;\n    var ov=document.createElement('div'); ov.id='mfilter'; ov.hidden=true;\n    ov.innerHTML=\n      '<div class=\"mf-head\"><span class=\"mf-title\">BESTECKE<\u002Fspan><span class=\"mf-cnt\" id=\"mfCnt\"><\u002Fspan><button class=\"mf-x\" id=\"mfX\">&times;<\u002Fbutton><\u002Fdiv>'+\n      '<div class=\"mf-body\" id=\"mfList\"><\u002Fdiv>'+\n      '<div class=\"mf-foot\"><button class=\"mf-reset\" id=\"mfResetAll\">Zur&uuml;cksetzen<\u002Fbutton><button class=\"mf-apply\" id=\"mfApply\"><\u002Fbutton><\u002Fdiv>'+\n      '<div class=\"mf-detail\"><div class=\"mf-dhead\"><button class=\"mf-back\" id=\"mfBack\">&#8592; Zur&uuml;ck<\u002Fbutton><span class=\"mf-dtitle\" id=\"mfDTitle\"><\u002Fspan><\u002Fdiv><div class=\"mf-dbody\" id=\"mfDBody\"><\u002Fdiv><div class=\"mf-foot\"><button class=\"mf-reset\" id=\"mfDReset\">Zur&uuml;cksetzen<\u002Fbutton><button class=\"mf-apply\" id=\"mfDApply\"><\u002Fbutton><\u002Fdiv><\u002Fdiv>';\n    document.body.appendChild(scrim); document.body.append  festlich',f:['stil','Elegant & festlich']},{t:'Keine Präferenz',f:null}]},\n      {id:'D5',price:true,q:'Welcher Preisrahmen passt zu Ihrer Auswahl?',sub:'Wir berücksichtigen Ihr Budget passend zu den gewählten Servierteilen.',opts:priceFixed(['Bis 50 €','Bis 100 €'],['50–100 €','100–200 €'],['Ab 100 €','200–300 €'])}\n    ];\n    if(P==='E'){\n      const base=[STEP1,\n        {id:'E2',q:'Welches Teil möchten Sie ergänzen oder ersetzen?',sub:'So finden wir gezielt passende Einzelteile für Ihre Besteckauswahl.',opts:[\n          {t:'Messer',f:['prodart','Menümesser']},{t:'Gabel',f:['prodart','Gabeln']},{t:'Löffel',f:['prodart','Löffel']},{t:'Kaffeelöffel',f:['prodart','Löffel']},{t:'Kuchengabel',f:['prodart','Gabeln']},{t:'Sonstiges Einzelteil',f:['prodart','Einzelne Besteckteile']}]},\n        {id:'E3',q:'Kennen Sie die passende Serie?',sub:'Wenn Sie die Serie kennen, zeigen wir Ihnen gezielter passende Einzelteile.',opts:[\n          {t:'Ja, ich kenne die Serie',f:null},{t:'Nein, ich bin unsicher',f:null},{t:'Ich möchte einfach ein passendes Einzelteil finden',f:null}]}\n      ];\n      const e3=fin.answers['E3'];\n      if(e3 && e3.t==='Ja, ich kenne die Serie') base.push(\n        {id:'E4a',q:'Welche Serie darf es sein?',sub:'Wählen Sie die Serie aus, zu der das Einzelteil passen soll.',opts:[\n          {t:'Kineo',f:['serie','Kineo']},{t:'Merit',f:['serie','Merit']},{t:'Kult Plus',f:['serie','Kult Plus']},{t:'Nuova',f:['serie','Nuova']},{t:'Boston',f:['serie','Boston']},{t:'Corvo',f:['serie','Corvo']},{t:'Andere Serie',f:null}]});\n      else if(e3 && e3.t==='Nein, ich bin unsicher') base.push(\n        {id:'E4b',q:'Welche Optik soll dazu passen?',sub:'So können wir Einzelteile mit einer ähnlichen Wirkung anzeigen.',opts:[\n          {t:'Poliert',f:['ober','Poliert']},{t:'Mattiert',f:['ober','Mattiert']},{t:'Schlicht',f:['stil','Modern & reduziert']},{t:'Dekorativ',f:['stil','Elegant & festlich']},{t:'Ich bin unsicher',f:null}]});\n      return base;\n    }\n    return [STEP1];\n  }\n\n  function totalSteps(){ return fin.path==='E' ? 4 : 5; }\n  function optSelected(step,opt){ if(opt.f) return F[opt.f[0]].has(opt.f[1]); const a=fin.answers[step.id]; return !!(a && a.t===opt.t && a.key===null); }\n  function reconcile(){ Object.keys(fin.answers).forEach(id=>{ const a=fin.answers[id]; if(a && a.key && !F[a.key].has(a.val)) delete fin.answers[id]; }); if(!fin.answers['S1']) fin.path=null; }\n  function clearFrom(list, fromIdx){ for(let i=fromIdx;i<list.length;i++){ const s=list[i]; const a=fin.answers[s.id]; if(a){ if(a.key) F[a.key].delete(a.val); delete fin.answers[s.id]; } } }\n\n  function selectOpt(step,opt){\n    const prev=fin.answers[step.id];\n    const list=stepList();\n    const myIdx=list.findIndex(s=>s.id===step.id);\n    if(prev && prev.t===opt.t){\n      if(prev.key) F[prev.key].delete(prev.val);\n      delete fin.answers[step.id];\n      if(step.id==='S1') fin.path=null;\n      if(step.id==='S1'||step.id==='E3') clearFrom(list, myIdx+1);\n    } else {\n      if(prev && prev.key) F[prev.key].delete(prev.val);\n      if(step.id==='S1'||step.id==='E3') clearFrom(list, myIdx+1);\n      if(opt.f) F[opt.f[0]].add(opt.f[1]);\n      fin.answers[step.id]={t:opt.t, key:opt.f?opt.f[0]:null, val:opt.f?opt.f[1]:null};\n      if(step.id==='S1') fin.path=opt.path;\n      if(step.id==='E2') F.prodart.delete('Einzelne Besteckteile');\n    }\n    syncChipsFromFilters(); paintPLP(); renderFinder();\n  }\n\n  function previewHtml(show){\n    if(!show) return '';\n    const list=sortProducts(visible());\n    const n=total();\n    if(!list.length) return \"<div class='finder-preview'><div class='fp-head'><span class='fp-title'>Passende Produkte<\u002Fspan><\u002Fdiv><div class='fp-empty'>F&uuml;r diese Auswahl gibt es aktuell keine Treffer.<\u002Fdiv><\u002Fdiv>\";\n    const cards=list.slice(0,6).map(p=>\"<div class='fp-card'><div class='fp-img'><svg class='shot \"+shotColorClass(p)+\"' viewBox='0 0 60 100'><use href='#i-cutlery'/><\u002Fsvg><\u002Fdiv><div class='fp-brand'>\"+p.brand+\"<\u002Fdiv><div class='fp-price'>&euro;\"+price(p)+\"<\u002Fdiv><\u002Fdiv>\").join('');\n    return \"<div class='finder-preview'><div class='fp-head'><span class='fp-title'>Passende Produkte<\u002Fspan><span class='fp-count'>\"+n+\" Treffer<\u002Fspan><\u002Fdiv><div class='fp-scroll'>\"+cards+\"<\u002Fdiv><\u002Fdiv>\";\n  }\n\n  function renderFinder(){\n    reconcile();\n    const list=stepList();\n    if(fin.step>list.length-1) fin.step=list.length-1;\n    if(fin.step<0) fin.step=0;\n    if(fin.done){ renderFinderDone(); return; }\n    const idx=fin.step, step=list[idx];\n    const canAdv=fin.answers[step.id]!=null;\n    const isLast=idx===list.length-1;\n    const optHtml=step.opts.map((o,i)=>{\n      const sel=optSelected(step,o)?' sel':'';\n      const th=step.thumbs?\"<span class='finder-thumb'><\u002Fspan>\":'';\n      const body=o.sub?(\"<span class='fo-l'>\"+o.t+\"<\u002Fspan><span class='fo-s'>\"+o.sub+\"<\u002Fspan>\"):o.t;\n      const cls='finder-opt'+sel+(o.sub?' two':'')+(step.thumbs?' thumb':'');\n      return \"<button class='\"+cls+\"' data-i='\"+i+\"'>\"+th+body+\"<\u002Fbutton>\";\n    }).join('');\n    const nextCls='finder-next '+(canAdv?'enabled':'disabled');\n    const backHtml=idx>0?\"<button class='finder-back' id='finderBack'>&#8592; Zurück<\u002Fbutton>\":'';\n    const nextLbl=isLast?'Auswahl anzeigen &#8594;':'Weiter &#8594;';\n    finderEl.innerHTML=\"<div class='finder-head'><div class='finder-q'><span class='spark'>&#10022;<\u002Fspan> \"+step.q+\"<\u002Fdiv><div class='finder-step'>Schritt \"+(idx+1)+\" von \"+totalSteps()+\"<\u002Fdiv><\u002Fdiv>\"+\n      \"<div class='finder-hint'>\"+step.sub+\"<\u002Fdiv>\"+\n      \"<div class='finder-opts'>\"+optHtml+\"<\u002Fdiv>\"+\n      previewHtml(canAdv)+\n      \"<div class='finder-actions'>\"+backHtml+\"<button class='\"+nextCls+\"' id='finderNext'>\"+nextLbl+\"<\u002Fbutton><\u002Fdiv>\";\n    finderEl.querySelectorAll('.finder-opt').forEach(b=>{ b.addEventListener('click',()=>selectOpt(step, step.opts[+b.dataset.i])); });\n    const back=finderEl.querySelector('#finderBack'); if(back) back.addEventListener('click',()=>{ fin.step=Math.max(0,fin.step-1); renderFinder(); });\n    finderEl.querySelector('#finderNext').addEventListener('click',()=>{ if(!canAdv) return; if(isLast){ syncChipsFromFilters(); paintPLP(); pfToggle(false); } else { fin.step=idx+1; renderFinder(); } });\n  }\n\n  function renderFinderDone(){\n    const chips=Object.values(fin.answers).filter(a=>a.key).map(a=>\"<span class='finder-chip'>\"+a.val+\"<button class='fc-x' data-k='\"+a.key+\"' data-v='\"+a.val+\"'>&times;<\u002Fbutton><\u002Fspan>\").join('');\n    finderEl.innerHTML=\"<div class='finder-q'><span class='spark'>&#10022;<\u002Fspan> Ihre Auswahl wurde angewendet.<\u002Fdiv>\"+\n      \"<div class='finder-hint' style='margin-left:28px'>Sie können die Auswahl über die Filter oder die aktiven Chips weiter anpassen.<\u002Fdiv>\"+\n      \"<div class='finder-chips'>\"+(chips||\"<span style='color:#5e5326;font-size:13px'>Keine Filter gesetzt.<\u002Fspan>\")+\"<\u002Fdiv>\"+\n      \"<div class='finder-actions-row'><button class='finder-next restart' id='finderEdit'>Auswahl ändern<\u002Fbutton><button class='finder-next enabled' id='finderRestart'>Neu starten<\u002Fbutton><\u002Fdiv>\";\n    finderEl.querySelectorAll('.fc-x').forEach(x=>{ x.addEventListener('click',()=>{ F[x.dataset.k].delete(x.dataset.v); Object.keys(fin.answers).forEach(id=>{ const a=fin.answers[id]; if(a.key===x.dataset.k && a.val===x.dataset.v) delete fin.answers[id]; }); if(!fin.answers['S1']) fin.path=null; syncChipsFromFilters(); paintPLP(); renderFinder(); }); });\n    finderEl.querySelector('#finderEdit').addEventListener('click',()=>{ fin.done=false; fin.step=0; renderFinder(); });\n    finderEl.querySelector('#finderRestart').addEventListener('click',()=>{ Object.values(fin.answers).forEach(a=>{ if(a.key) F[a.key].delete(a.val); }); fin.answers={}; fin.path=null; fin.step=0; fin.done=false; syncChipsFromFilters(); paintPLP(); renderFinder(); });\n  }\n  renderFinder();\n})();\n<\u002Fscript>\n<script>\n  function pfToggle(open){\n    var f=document.getElementById('pf-finder');\n    f.classList.toggle('pf-open', open);\n    document.getElementById('pf-btn').setAttribute('aria-expanded', open?'true':'false');\n  }\n<\u002Fscript>\n<script>(function(){\n  var q=document.getElementById('q');if(q)q.placeholder='Suchen';\n  var af=document.getElementById('allFilters'),sort=document.getElementById('sort');\n  if(af&&sort){var w=document.createElement('div');w.className='m-sortwrap';var l=document.createElement('div');l.className='ftitle';l.textContent='Sortieren nach';w.appendChild(l);w.appendChild(sort);af.appendChild(w);}\n})();<\u002Fscript>\n\n\n \n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
