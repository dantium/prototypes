document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

der-radius:6px;cursor:pointer;background:#f4f4f2\">\n                <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8a8a86\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 17 9 11l4 4 8-8\"><\u002Fpath><path d=\"M17 7h4v4\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-size:15px;color:#1a1a1a\">{{ t.label }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"padding:8px 24px 22px\">\n            <div style=\"font-size:11px;font-weight:500;letter-spacing:0.16em;color:#9a9a96;padding:6px 0 12px;font-family:'WMF Rotis',Arial,sans-serif\">POPULAR CATEGORIES<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n              <sc-for list=\"{{ popularCats }}\" as=\"c\" hint-placeholder-count=\"5\">\n                <span onclick=\"{{ c.onClick }}\" style=\"font-size:13px;color:#1a1a1a;border:1px solid #dcdcd8;border-radius:9999px;padding:8px 16px;cursor:pointer\">{{ c.label }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- AUTOCOMPLETE (query present) -->\n        <sc-if value=\"{{ showAutocomplete }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:10px 14px 6px\">\n            <sc-for list=\"{{ autoQueryItems }}\" as=\"q\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ q.onClick }}\" style=\"display:flex;align-items:center;gap:14px;padding:8px 10px;border-radius:6px;cursor:pointer\" style-hover=\"display:flex;align-items:center;gap:14px;padding:8px 10px;border-radius:6px;cursor:pointer;background:#f4f4f2\">\n                <div style=\"width:48px;height:48px;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8a8a86\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <span style=\"flex:1;font-size:15px;color:#1a1a1a\">{{ q.pre }}<b style=\"font-weight:700\">{{ q.match }}<\u002Fb>{{ q.post }}<\u002Fspan>\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#c0c0bb\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 17 7 7\"><\u002Fpath><path d=\"M7 13V7h6\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n\n            <sc-if value=\"{{ hasAutoCategories }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"height:1px;background:#ededed;margin:8px 10px\"><\u002Fdiv>\n              <sc-for list=\"{{ autoCategoryItems }}\" as=\"c\" hint-placeholder-count=\"1\">\n                <div onclick=\"{{ c.onClick }}\" style=\"display:flex;align-items:center;gap:14px;padding:8px 10px;border-radius:6px;cursor:pointer\" style-hover=\"display:flex;align-items:center;gap:14px;padding:8px 10px;border-radius:6px;cursor:pointer;background:#f4f4f2\">\n                  <div style=\"width:48px;height:48px;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6b6b67\" stroke-width=\"1.5\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n                  <div style=\"flex:1\"><div style=\"font-size:15px;color:#1a1a1a\">{{ c.pre }}<b style=\"font-weight:700\">{{ c.match }}<\u002Fb>{{ c.post }}<\u002Fdiv><div style=\"font-size:12px;color:#8a8a86;margin-top:2px\">{{ c.meta }}<\u002Fdiv><\u002Fdiv>\n                  <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#b0b0aa\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m9 6 6 6-6 6\"><\u002Fpath><\u002Fsvg>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ hasAutoProducts }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"height:1px;background:#ededed;margin:8px 10px\"><\u002Fdiv>\n              <sc-for list=\"{{ autoProductItems }}\" as=\"p\" hint-placeholder-count=\"3\">\n                <div onclick=\"{{ p.onClick }}\" style=\"display:flex;align-items:center;gap:14px;padding:8px 10px;border-radius:6px;cursor:pointer\" style-hover=\"display:flex;align-items:center;gap:14px;padding:8px 10px;border-radius:6px;cursor:pointer;background:#f4f4f2\">\n                  <div style=\"width:48px;height:48px;border-radius:4px;background:#ececea;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#c4c4be\" stroke-width=\"1.2\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><circle cx=\"8.5\" cy=\"8.5\" r=\"1.6\"><\u002Fcircle><path d=\"m21 15-5-5L5 21\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                  <span style=\"flex:1;font-size:14px;color:#1a1a1a\">{{ p.name }}<\u002Fspan>\n                  <span style=\"font-size:14px;font-weight:600;color:#1a1a1a\">{{ p.price }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ noAutoMatches }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:18px 12px;font-size:14px;color:#8a8a86\">No suggestions — press Enter to search.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"padding:8px 24px 20px;border-top:1px solid #ededed;margin-top:6px\">\n            <div onclick=\"{{ submitCurrent }}\" style=\"display:flex;align-items:center;justify-content:center;gap:10px;font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#111;padding:12px;cursor:pointer;font-family:'WMF Rotis',Arial,sans-serif\">\n              See all results for “{{ query }}”\n              <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#111\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"m13 6 6 6-6 6\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { open: false, query: '', view: 'home', recent: ['perfect ultra pressure cooker', 'grand gourmet chef knife', 'kineo cookware set'] };\n\n  catalog = [\n    { name: 'KÜCHENminis Aroma Coffee Maker', attr: 'Glass carafe · 0.65 L', price: '€89.99', tags: 'coffee machine maker filter' },\n    { name: 'Lumero Espresso Portafilter Machine', attr: '15 bar · Stainless steel', price: '€199.00', tags: 'coffee espresso machine' },\n    { name: 'Lono Milk & Coffee Frother', attr: 'Hot & cold foam', price: '€129.00', tags: 'coffee milk frother' },\n    { name: 'Coffee Machine Descaler, 2-pack', attr: '2 × 100 ml', price: '€9.99', tags: 'coffee descaler accessory' },\n    { name: 'Barista Stainless Coffee Grinder', attr: 'Conical burr · 18 levels', price: '€149.00', tags: 'coffee grinder' },\n    { name: 'Impulse Thermo Coffee Mug 0.35 L', attr: 'Double-wall · Leakproof', price: '€34.99', tags: 'coffee mug cup to-go' },\n    { name: 'Grand Gourmet Chef\\u2019s Knife 20 cm', attr: 'Forged blade', price: '€149.00', tags: 'knife chef cutlery blade' },\n    { name: 'Grand Gourmet Knife Block, 7 pcs', attr: 'Self-sharpening', price: '€399.00', tags: 'knife block cutlery' },\n    { name: 'Cromargan Cutlery Set, 30 pcs', attr: 'Dishwasher safe', price: '€199.00', tags: 'cutlery set fork spoon' },\n    { name: 'Perfect Ultra Pressure Cooker 6.5 L', attr: 'Cromargan steel', price: '€229.00', tags: 'pressure cooker pot' },\n    { name: 'Kineo Cookware Set, 4 pcs', attr: 'Induction-ready', price: '€399.00', tags: 'pan pot cookware set' },\n    { name: 'Profi Plus Frying Pan 28 cm', attr: 'Non-stick', price: '€79.00', tags: 'pan frying cookware' },\n  ];\n\n  querySuggestions = ['coffee machine', 'coffee grinder', 'coffee to-go cup', 'cutlery set', 'chef knife', 'knife block', 'pressure cooker', 'frying pan', 'cookware set', 'milk frother', 'espresso maker'];\n\n  acCategories = [\n    { name: 'Coffee Machines', meta: 'Category · 142 products', tags: 'coffee espresso machine grinder' },\n    { name: 'Knives', meta: 'Category · 86 products', tags: 'knife cutlery blade chef' },\n    { name: 'Cutlery', meta: 'Category · 64 products', tags: 'cutlery fork spoon' },\n    { name: 'Pressure Cookers', meta: 'Category · 24 products', tags: 'pressure cooker pot' },\n    { name: 'Cookware', meta: 'Category · 210 products', tags: 'pan pot cookware frying' },\n  ];\n\n  facets = [\n    { title: 'Category', options: [ { label: 'Coffee machines', count: 42 }, { label: 'Grinders', count: 11 }, { label: 'Mugs & cups', count: 38 }, { label: 'Accessories', count: 64 } ] },\n    { title: 'Price', options: [ { label: 'Under €50', count: 96 }, { label: '€50 – €150', count: 410 }, { label: '€150 – €300', count: 188 }, { label: 'Over €300', count: 54 } ] },\n    { title: 'Material', options: [ { label: 'Cromargan steel', count: 320 }, { label: 'Glass', count: 142 }, { label: 'Ceramic', count: 78 } ] },\n    { title: 'Rating', options: [ { label: '4 stars & up', count: 612 }, { label: '3 stars & up', count: 880 } ] },\n  ];\n\n  trending = ['Cromargan cutlery set', 'Perfect Plus pressure cooker', 'Lono milk frother', 'Profi Plus kitchen tools', 'Grand Gourmet knives', 'Coffee machine descaler'];\n  categories = ['Pans', 'Knives', 'Coffee Machines', 'Cutlery', 'Pressure Cookers'];\n\n  componentDidUpdate(pp, ps) {\n    if (this.state.open && !ps.open) { this.focusInput(); }\n  }\n\n  focusInput = () => {\n    requestAnimationFrame(() => { if (this.state.open && this.inputEl) this.inputEl.focus(); });\n  };\n\n  openSearch = () => this.setState({ open: true });\n  closeSearch = () => this.setState({ open: false });\n  goHome = () => this.setState({ open: false, query: '', view: 'home' });\n  clearHeader = (e) => { if (e) e.stopPropagation(); this.setState({ query: '', view: 'home', open: false }); };\n  clearQuery = () => { this.setState({ query: '' }); if (this.inputEl) this.inputEl.focus(); };\n  onInput = (e) => this.setState({ query: e.target.value });\n  onKeyDown = (e) => { if (e.key === 'Enter') this.submit(this.state.query); else if (e.key === 'Escape') this.setState({ open: false }); };\n  clearRecent = () => this.setState({ recent: [] });\n\n  submit(q) {\n    q = (q || '').trim();\n    if (!q) return;\n    this.setState(s => ({ query: q, view: 'results', open: false, recent: [q, ...s.recent.filter(r => r.toLowerCase() !== q.toLowerCase())].slice(0, 6) }));\n  }\n\n  matchProducts(q) {\n    const toks = q.toLowerCase().split(/\\s+/).filter(Boolean);\n    if (!toks.length) return [];\n    return this.catalog.filter(p => { const hay = (p.name + ' ' + p.attr + ' ' + p.tags).toLowerCase(); return toks.some(t => hay.includes(t)); });\n  }\n\n  highlight(text, q) {\n    const i = text.toLowerCase().indexOf(q.toLowerCase());\n    if (i < 0 || !q) return { pre: text, match: '', post: '' };\n    return { pre: text.slice(0, i), match: text.slice(i, i + q.length), post: text.slice(i + q.length) };\n  }\n\n  renderVals() {\n    const q = this.state.query;\n    const qt = q.trim();\n    const open = this.state.open;\n    const isResults = this.state.view === 'results';\n    const matched = isResults ? this.matchProducts(qt) : [];\n\n    const autoQ = qt ? this.querySuggestions.filter(s => s.toLowerCase().includes(qt.toLowerCase())).slice(0, 4) : [];\n    const autoC = qt ? this.acCategories.filter(c => (c.name + ' ' + c.tags).toLowerCase().includes(qt.toLowerCase())).slice(0, 2) : [];\n    const autoP = qt ? this.matchProducts(qt).slice(0, 3) : [];\n\n    return {\n      navItems: ['PANS', 'POTS', 'KNIVES', 'CUTLERY', 'DINING', 'KITCHEN TOOLS', 'COFFEE MACHINES', 'APPLIANCES', 'OFFERS'],\n      query: q,\n      open,\n      hasHeaderQuery: qt !== '',\n      noHeaderQuery: qt === '',\n      isHome: !isResults,\n      isResults,\n      hasHits: isResults && matched.length > 0,\n      isEmpty: isResults && matched.length === 0,\n      resultsCount: matched.length,\n      results: matched,\n      facets: this.facets,\n\n      showInitial: open && qt === '',\n      showAutocomplete: open && qt !== '',\n      showRecent: this.state.recent.length > 0,\n\n      bestsellers: [\n        { name: 'Perfect Ultra Pressure Cooker 6.5 L', attr: 'Cromargan steel', price: '€229.00', onClick: () => this.submit('pressure cooker') },\n        { name: 'Grand Gourmet Chef\\u2019s Knife 20 cm', attr: 'Forged blade', price: '€149.00', onClick: () => this.submit('chef knife') },\n        { name: 'Lumero Espresso Maker', attr: '15 bar', price: '€199.00', onClick: () => this.submit('espresso') },\n        { name: 'Kineo Cookware Set, 4 pcs', attr: 'Induction-ready', price: '€399.00', onClick: () => this.submit('cookware set') },\n      ],\n\n      trendingItems: this.trending.map(t => ({ label: t, onClick: () => this.submit(t) })),\n      popularCats: this.categories.map(c => ({ label: c, onClick: () => this.submit(c) })),\n      recentItems: this.state.recent.map((r, i) => ({ label: r, onClick: () => this.submit(r), onRemove: (e) => { if (e) e.stopPropagation(); this.setState(s => ({ recent: s.recent.filter((_, j) => j !== i) })); } })),\n\n      autoQueryItems: autoQ.map(s => { const h = this.highlight(s, qt); return { ...h, onClick: () => this.submit(s) }; }),\n      autoCategoryItems: autoC.map(c => { const h = this.highlight(c.name, qt); return { ...h, meta: c.meta, onClick: () => this.submit(c.name) }; }),\n      autoProductItems: autoP.map(p => ({ name: p.name, price: p.price, onClick: () => this.submit(p.name) })),\n      hasAutoCategories: autoC.length > 0,\n      hasAutoProducts: autoP.length > 0,\n      noAutoMatches: qt !== '' && autoQ.length === 0 && autoC.length === 0 && autoP.length === 0,\n\n      submitCurrent: () => this.submit(q),\n      openSearch: this.openSearch,\n      closeSearch: this.closeSearch,\n      goHome: this.goHome,\n      clearHeader: this.clearHeader,\n      clearQuery: this.clearQuery,\n      clearRecent: this.clearRecent,\n      onInput: this.onInput,\n      onKeyDown: this.onKeyDown,\n      inputRef: (el) => { this.inputEl = el; if (el && this.state.open) this.focusInput(); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
